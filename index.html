<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Genre Draw</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

* { box-sizing: border-box; }

body {
  --ink: #14121A;
  --panel: #1E1B29;
  --panel-2: #262236;
  --paper: #F2ECD8;
  --coral: #FF5D73;
  --amber: #F4C744;
  --cyan: #4FD2C7;
  --muted: #8B86A0;

  margin: 0;
  font-family: 'Space Grotesk', sans-serif;
  background: var(--ink);
  color: var(--paper);
  min-height: 100vh;
  padding: 32px 16px 64px;
  background-image:
    radial-gradient(circle at 15% 10%, rgba(255,93,115,0.10), transparent 40%),
    radial-gradient(circle at 85% 90%, rgba(79,210,199,0.10), transparent 40%);
}

.gd-wrap { max-width: 560px; margin: 0 auto; }

.gd-header { text-align: center; margin-bottom: 28px; }
.gd-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.18em;
  color: var(--cyan);
  text-transform: uppercase;
  margin: 0 0 6px;
}
.gd-title {
  font-family: 'Anton', sans-serif;
  font-weight: 400;
  font-size: clamp(32px, 8vw, 46px);
  letter-spacing: 0.02em;
  margin: 0;
  line-height: 1;
}
.gd-title span { color: var(--coral); }
.gd-sub {
  font-size: 14px;
  color: var(--muted);
  margin: 8px 0 0;
}

.gd-ticket {
  position: relative;
  background: var(--panel);
  border-radius: 18px;
  padding: 28px 26px 24px;
  margin-bottom: 8px;
  overflow: hidden;
  border: 1px solid rgba(242,236,216,0.08);
}
.gd-ticket::before, .gd-ticket::after {
  content: "";
  position: absolute;
  width: 26px; height: 26px;
  background: var(--ink);
  border-radius: 50%;
  top: 50%;
  transform: translateY(-50%);
}
.gd-ticket::before { left: -13px; }
.gd-ticket::after { right: -13px; }

.gd-perf {
  border-top: 2px dashed rgba(242,236,216,0.18);
  margin: 22px -26px 20px;
}

.gd-ticket-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
}

.gd-drawn-for {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin: 4px 0 2px;
}

.gd-person {
  font-family: 'Anton', sans-serif;
  font-size: clamp(38px, 12vw, 58px);
  line-height: 1;
  margin: 2px 0 14px;
  color: var(--paper);
  min-height: 1.1em;
}

.gd-genre-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin: 0 0 6px;
}
.gd-genre-stamp {
  display: inline-block;
  font-family: 'Anton', sans-serif;
  font-size: clamp(20px, 5.5vw, 26px);
  color: var(--amber);
  border: 3px solid var(--amber);
  border-radius: 8px;
  padding: 6px 16px;
  transform: rotate(-2.5deg);
  letter-spacing: 0.02em;
}

.gd-status-row {
  margin-top: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
}
.gd-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
.gd-dot.gd-live { background: var(--cyan); box-shadow: 0 0 0 3px rgba(79,210,199,0.18); }
.gd-dot.gd-done { background: var(--coral); box-shadow: 0 0 0 3px rgba(255,93,115,0.18); }

.gd-form { margin-top: 18px; }
.gd-field { margin-bottom: 12px; }
.gd-field label {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
.gd-field input {
  width: 100%;
  background: var(--panel-2);
  border: 1px solid rgba(242,236,216,0.14);
  border-radius: 8px;
  padding: 11px 12px;
  color: var(--paper);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 15px;
}
.gd-field input:focus {
  outline: 2px solid var(--cyan);
  outline-offset: 1px;
  border-color: transparent;
}
.gd-field input::placeholder { color: rgba(242,236,216,0.32); }

.gd-row2 { display: flex; gap: 10px; }
.gd-row2 .gd-field { flex: 1; }

.gd-submit-btn {
  width: 100%;
  background: var(--coral);
  color: var(--ink);
  border: none;
  border-radius: 8px;
  padding: 13px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  margin-top: 4px;
  transition: transform 0.1s ease, background 0.15s ease;
}
.gd-submit-btn:hover { background: #ff7286; }
.gd-submit-btn:active { transform: scale(0.98); }
.gd-submit-btn:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }
.gd-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.gd-submitted {
  margin-top: 18px;
  background: var(--panel-2);
  border-radius: 10px;
  padding: 16px;
  border-left: 3px solid var(--coral);
}
.gd-submitted .gd-song-title {
  font-family: 'Anton', sans-serif;
  font-size: 20px;
  margin: 0 0 2px;
}
.gd-submitted .gd-song-artist {
  color: var(--muted);
  font-size: 14px;
  margin: 0 0 8px;
}
.gd-submitted a {
  color: var(--cyan);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  text-decoration: none;
  border-bottom: 1px solid rgba(79,210,199,0.4);
}
.gd-edit-link {
  background: none;
  border: none;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  text-decoration: underline;
  cursor: pointer;
  padding: 0;
  margin-top: 10px;
}

.gd-upnext {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin: 18px 4px 28px;
  letter-spacing: 0.05em;
  flex-wrap: wrap;
}
.gd-upnext b { color: var(--paper); font-weight: 600; }
.gd-arrow { color: var(--muted); }

.gd-hist-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin: 0 0 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.gd-hist-title::after {
  content: "";
  flex: 1;
  height: 1px;
  background: rgba(242,236,216,0.12);
}

.gd-stub {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  background: var(--panel);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 8px;
  border: 1px solid rgba(242,236,216,0.06);
}
.gd-stub-left { min-width: 0; }
.gd-stub-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.gd-stub-main {
  font-size: 14px;
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.gd-stub-main b { color: var(--paper); }
.gd-stub-genre {
  flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--amber);
  border: 1px solid rgba(244,199,68,0.4);
  border-radius: 6px;
  padding: 4px 8px;
}
.gd-empty {
  color: var(--muted);
  font-size: 13px;
  font-family: 'JetBrains Mono', monospace;
  padding: 8px 2px;
}

.gd-loading, .gd-error {
  text-align: center;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  padding: 40px 0;
}
.gd-error { color: var(--coral); }

@media (max-width: 380px) {
  .gd-row2 { flex-direction: column; }
}
</style>
</head>
<body>
  <div class="gd-wrap" id="gd-app">
    <div class="gd-loading">shuffling the crate...</div>
  </div>

<script>
(function() {
  // ---- Your Supabase project details ----
  const SUPABASE_URL = "https://cqnpjwyldsuxkpazsoxx.supabase.co";
  const SUPABASE_KEY = "sb_publishable_UjD0ZU9zQ3SGLM0FV1uKQA_IitMevWS";
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const NAMES = ["Nick", "Nani", "Trenton", "Danny", "Jace"];
  const GENRES = [
    "City Pop", "Shoegaze", "Motown", "Bossa Nova", "90s Boom Bap",
    "Yacht Rock", "Afrobeat", "Britpop", "Synthwave", "Bluegrass",
    "K-Pop", "Reggaeton", "Dream Pop", "Funk", "Disco",
    "Post-Punk", "Trip-Hop", "Flamenco Pop", "Deep Soul", "Grunge",
    "Ambient", "Jazz Fusion", "Country Pop", "Emo Revival", "Doo-Wop",
    "Neo-Soul", "Math Rock", "Baroque Pop", "Ska", "Industrial"
  ];

  const root = document.getElementById('gd-app');
  let state = { config: null, today: null, history: [] };

  function todayStr() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return y + "-" + m + "-" + day;
  }

  function prettyDate(iso) {
    const parts = iso.split('-').map(Number);
    const dt = new Date(parts[0], parts[1] - 1, parts[2]);
    return dt.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  function pickGenre(recent) {
    const pool = GENRES.filter(g => recent.indexOf(g) === -1);
    const usable = pool.length ? pool : GENRES;
    return usable[Math.floor(Math.random() * usable.length)];
  }

  async function getConfig() {
    const { data, error } = await sb.from('config').select('*').eq('id', 1).maybeSingle();
    if (error) throw error;
    if (data) {
      return { order: data.order_list, cursor: data.cursor, recentGenres: data.recent_genres };
    }
    const fresh = { order: shuffle(NAMES), cursor: 0, recentGenres: [] };
    const { error: insertErr } = await sb.from('config').insert({
      id: 1, order_list: fresh.order, cursor: fresh.cursor, recent_genres: fresh.recentGenres
    });
    if (insertErr) throw insertErr;
    return fresh;
  }

  async function saveConfig(config) {
    const { error } = await sb.from('config').update({
      order_list: config.order, cursor: config.cursor, recent_genres: config.recentGenres
    }).eq('id', 1);
    if (error) throw error;
  }

  async function getOrCreateToday(config) {
    const key = todayStr();
    const { data, error } = await sb.from('draws').select('*').eq('id', key).maybeSingle();
    if (error) throw error;
    if (data) return { entry: rowToEntry(data), config };

    const person = config.order[config.cursor % config.order.length];
    const genre = pickGenre(config.recentGenres);
    const newConfig = {
      order: (config.cursor % config.order.length === config.order.length - 1) ? shuffle(config.order) : config.order,
      cursor: config.cursor + 1,
      recentGenres: [genre].concat(config.recentGenres).slice(0, 6)
    };

    const { error: insertErr } = await sb.from('draws').insert({
      id: key, person: person, genre: genre
    });
    if (insertErr) throw insertErr;
    await saveConfig(newConfig);

    return { entry: { date: key, person: person, genre: genre, song: null }, config: newConfig };
  }

  function rowToEntry(row) {
    return {
      date: row.id,
      person: row.person,
      genre: row.genre,
      song: row.song_title ? { title: row.song_title, artist: row.song_artist, url: row.song_url } : null
    };
  }

  async function loadHistory(excludeKey) {
    const { data, error } = await sb.from('draws')
      .select('*')
      .neq('id', excludeKey)
      .order('id', { ascending: false })
      .limit(14);
    if (error) throw error;
    return (data || []).map(rowToEntry);
  }

  async function saveSong(key, song) {
    const { error } = await sb.from('draws').update({
      song_title: song.title, song_artist: song.artist, song_url: song.url || null
    }).eq('id', key);
    if (error) throw error;
  }

  function render() {
    const config = state.config;
    const entry = state.today;
    const history = state.history;

    const upcoming = [];
    for (let i = 0; i < 3; i++) {
      upcoming.push(config.order[(config.cursor + i) % config.order.length]);
    }

    const statusDot = entry.song ? 'gd-done' : 'gd-live';
    const statusText = entry.song ? 'Submitted' : 'Awaiting submission';

    let historyHtml;
    if (history.length === 0) {
      historyHtml = '<p class="gd-empty">No history yet — today is the first draw.</p>';
    } else {
      historyHtml = history.map(function(h) {
        const main = h.song
          ? '<b>' + escapeHtml(h.song.title) + '</b> — ' + escapeHtml(h.song.artist) + ' <span style="color:var(--muted)">· ' + h.person + '</span>'
          : '<span style="color:var(--muted)">' + h.person + ' never sent one</span>';
        return '<div class="gd-stub">' +
          '<div class="gd-stub-left">' +
            '<div class="gd-stub-date">' + prettyDate(h.date) + '</div>' +
            '<div class="gd-stub-main">' + main + '</div>' +
          '</div>' +
          '<div class="gd-stub-genre">' + h.genre + '</div>' +
        '</div>';
      }).join('');
    }

    const upnextHtml = upcoming.map(function(n, i) {
      return '<b>' + n + '</b>' + (i < upcoming.length - 1 ? '<span class="gd-arrow">&rarr;</span>' : '');
    }).join('');

    root.innerHTML =
      '<div class="gd-header">' +
        '<p class="gd-eyebrow">Group Chat Radio</p>' +
        '<h1 class="gd-title">Genre <span>Draw</span></h1>' +
        '<p class="gd-sub">One name. One genre. One song a day.</p>' +
      '</div>' +
      '<div class="gd-ticket">' +
        '<div class="gd-ticket-top"><span>Admit One</span><span>' + prettyDate(entry.date) + '</span></div>' +
        '<p class="gd-drawn-for">Today\'s pick</p>' +
        '<p class="gd-person">' + entry.person + '</p>' +
        '<p class="gd-genre-label">Assigned genre</p>' +
        '<div class="gd-genre-stamp">' + entry.genre + '</div>' +
        '<div class="gd-status-row"><span class="gd-dot ' + statusDot + '"></span><span>' + statusText + '</span></div>' +
        '<div class="gd-perf"></div>' +
        '<div id="gd-form-zone"></div>' +
      '</div>' +
      '<div class="gd-upnext"><span>Up next:</span>' + upnextHtml + '</div>' +
      '<p class="gd-hist-title">Past Draws</p>' +
      '<div id="gd-history-zone">' + historyHtml + '</div>';

    renderFormZone();
  }

  function renderFormZone(editing) {
    const zone = document.getElementById('gd-form-zone');
    const entry = state.today;

    if (entry.song && !editing) {
      zone.innerHTML =
        '<div class="gd-submitted">' +
          '<p class="gd-song-title">' + escapeHtml(entry.song.title) + '</p>' +
          '<p class="gd-song-artist">' + escapeHtml(entry.song.artist) + '</p>' +
          (entry.song.url ? '<a href="' + escapeHtml(entry.song.url) + '" target="_blank" rel="noopener">Open link &rarr;</a>' : '') +
        '</div>' +
        '<button class="gd-edit-link" id="gd-edit-btn">Edit submission</button>';
      document.getElementById('gd-edit-btn').onclick = function() { renderFormZone(true); };
      return;
    }

    zone.innerHTML =
      '<div class="gd-form">' +
        '<div class="gd-row2">' +
          '<div class="gd-field"><label for="gd-title">Song title</label>' +
          '<input id="gd-title" type="text" placeholder="e.g. Plastic Love" value="' + (entry.song ? escapeHtml(entry.song.title) : '') + '" /></div>' +
          '<div class="gd-field"><label for="gd-artist">Artist</label>' +
          '<input id="gd-artist" type="text" placeholder="e.g. Mariya Takeuchi" value="' + (entry.song ? escapeHtml(entry.song.artist) : '') + '" /></div>' +
        '</div>' +
        '<div class="gd-field"><label for="gd-url">Link (optional)</label>' +
        '<input id="gd-url" type="url" placeholder="Spotify / YouTube / Apple Music link" value="' + (entry.song && entry.song.url ? escapeHtml(entry.song.url) : '') + '" /></div>' +
        '<button class="gd-submit-btn" id="gd-submit-btn">Send it to the group</button>' +
      '</div>';

    document.getElementById('gd-submit-btn').onclick = async function() {
      const title = document.getElementById('gd-title').value.trim();
      const artist = document.getElementById('gd-artist').value.trim();
      const url = document.getElementById('gd-url').value.trim();
      const btn = document.getElementById('gd-submit-btn');
      if (!title || !artist) {
        btn.textContent = "Add a title and artist first";
        setTimeout(function() { btn.textContent = "Send it to the group"; }, 1600);
        return;
      }
      btn.disabled = true;
      btn.textContent = "Sending...";
      try {
        await saveSong(state.today.date, { title: title, artist: artist, url: url });
        state.today.song = { title: title, artist: artist, url: url };
        render();
      } catch (e) {
        btn.disabled = false;
        btn.textContent = "Something went wrong — try again";
        console.error(e);
      }
    };
  }

  async function init() {
    try {
      const config = await getConfig();
      const result = await getOrCreateToday(config);
      const history = await loadHistory(result.entry.date);
      state = { config: result.config, today: result.entry, history: history };
      render();
    } catch (e) {
      console.error(e);
      root.innerHTML = '<div class="gd-error">Couldn\'t connect to the database. Check the console for details, or double-check the Supabase URL/key and that the tables were created.</div>';
    }
  }

  init();
})();
</script>
</body>
</html>
