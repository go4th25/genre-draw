<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Genre Draw</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

* { box-sizing: border-box; }

body {
  --ink: #14121A;
  --panel: #1E1B29;
  --panel-2: #262236;
  --paper: #F2ECD8;
  --coral: #FF5D73;
  --amber: #F4C744;
  --cyan: #4FD2C7;
  --muted: #8B86A0;

  margin: 0;
  font-family: 'Space Grotesk', sans-serif;
  background: var(--ink);
  color: var(--paper);
  min-height: 100vh;
  padding: 32px 16px 64px;
  background-image:
    radial-gradient(circle at 15% 10%, rgba(255,93,115,0.10), transparent 40%),
    radial-gradient(circle at 85% 90%, rgba(79,210,199,0.10), transparent 40%);
}

.gd-wrap { max-width: 560px; margin: 0 auto; }

.gd-header { text-align: center; margin-bottom: 28px; }
.gd-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.18em;
  color: var(--cyan);
  text-transform: uppercase;
  margin: 0 0 6px;
}
.gd-title {
  font-family: 'Anton', sans-serif;
  font-weight: 400;
  font-size: clamp(32px, 8vw, 46px);
  letter-spacing: 0.02em;
  margin: 0;
  line-height: 1;
}
.gd-title span { color: var(--coral); }
.gd-sub {
  font-size: 14px;
  color: var(--muted);
  margin: 8px 0 0;
}

.gd-ticket {
  position: relative;
  background: var(--panel);
  border-radius: 18px;
  padding: 28px 26px 24px;
  margin-bottom: 8px;
  overflow: hidden;
  border: 1px solid rgba(242,236,216,0.08);
}
.gd-ticket::before, .gd-ticket::after {
  content: "";
  position: absolute;
  width: 26px; height: 26px;
  background: var(--ink);
  border-radius: 50%;
  top: 50%;
  transform: translateY(-50%);
}
.gd-ticket::before { left: -13px; }
.gd-ticket::after { right: -13px; }

.gd-perf {
  border-top: 2px dashed rgba(242,236,216,0.18);
  margin: 22px -26px 20px;
}

.gd-ticket-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
}

.gd-drawn-for {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin: 4px 0 2px;
}

.gd-person {
  font-family: 'Anton', sans-serif;
  font-size: clamp(38px, 12vw, 58px);
  line-height: 1;
  margin: 2px 0 14px;
  color: var(--paper);
  min-height: 1.1em;
}

.gd-genre-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin: 0 0 6px;
}
.gd-genre-stamp {
  display: inline-block;
  font-family: 'Anton', sans-serif;
  font-size: clamp(20px, 5.5vw, 26px);
  color: var(--amber);
  border: 3px solid var(--amber);
  border-radius: 8px;
  padding: 6px 16px;
  transform: rotate(-2.5deg);
  letter-spacing: 0.02em;
}

.gd-status-row {
  margin-top: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
}
.gd-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
.gd-dot.gd-live { background: var(--cyan); box-shadow: 0 0 0 3px rgba(79,210,199,0.18); }
.gd-dot.gd-done { background: var(--coral); box-shadow: 0 0 0 3px rgba(255,93,115,0.18); }

.gd-form { margin-top: 18px; }
.gd-field { margin-bottom: 12px; }
.gd-field label {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
.gd-field input {
  width: 100%;
  background: var(--panel-2);
  border: 1px solid rgba(242,236,216,0.14);
  border-radius: 8px;
  padding: 11px 12px;
  color: var(--paper);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 15px;
}
.gd-field input:focus {
  outline: 2px solid var(--cyan);
  outline-offset: 1px;
  border-color: transparent;
}
.gd-field input::placeholder { color: rgba(242,236,216,0.32); }

.gd-row2 { display: flex; gap: 10px; }
.gd-row2 .gd-field { flex: 1; }

.gd-submit-btn {
  width: 100%;
  background: var(--coral);
  color: var(--ink);
  border: none;
  border-radius: 8px;
  padding: 13px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  margin-top: 4px;
  transition: transform 0.1s ease, background 0.15s ease;
}
.gd-submit-btn:hover { background: #ff7286; }
.gd-submit-btn:active { transform: scale(0.98); }
.gd-submit-btn:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }
.gd-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.gd-submitted {
  margin-top: 18px;
  background: var(--panel-2);
  border-radius: 10px;
  padding: 16px;
  border-left: 3px solid var(--coral);
}
.gd-submitted .gd-song-title {
  font-family: 'Anton', sans-serif;
  font-size: 20px;
  margin: 0 0 2px;
}
.gd-submitted .gd-song-artist {
  color: var(--muted);
  font-size: 14px;
  margin: 0 0 8px;
}
.gd-submitted a {
  color: var(--cyan);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  text-decoration: none;
  border-bottom: 1px solid rgba(79,210,199,0.4);
}
.gd-edit-link {
  background: none;
  border: none;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  text-decoration: underline;
  cursor: pointer;
  padding: 0;
  margin-top: 10px;
}

.gd-upnext {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin: 18px 4px 28px;
  letter-spacing: 0.05em;
  flex-wrap: wrap;
}
.gd-upnext b { color: var(--paper); font-weight: 600; }
.gd-arrow { color: var(--muted); }

.gd-hist-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin: 0 0 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.gd-hist-title::after {
  content: "";
  flex: 1;
  height: 1px;
  background: rgba(242,236,216,0.12);
}

.gd-stub {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  background: var(--panel);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 8px;
  border: 1px solid rgba(242,236,216,0.06);
}
.gd-stub-left { min-width: 0; }
.gd-stub-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.gd-stub-main {
  font-size: 14px;
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.gd-stub-main b { color: var(--paper); }
.gd-stub-genre {
  flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--amber);
  border: 1px solid rgba(244,199,68,0.4);
  border-radius: 6px;
  padding: 4px 8px;
}
.gd-empty {
  color: var(--muted);
  font-size: 13px;
  font-family: 'JetBrains Mono', monospace;
  padding: 8px 2px;
}

.gd-loading, .gd-error {
  text-align: center;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  padding: 40px 0;
}
.gd-error { color: var(--coral); }

@media (max-width: 380px) {
  .gd-row2 { flex-direction: column; }
}
</style>

<style>
.gd-player-select { margin: 18px 0; background: var(--panel); border-radius: 14px; padding: 16px; border: 1px solid rgba(242,236,216,0.08); }
.gd-player-select label { display:block; font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
.gd-player-select select { width:100%; background:var(--panel-2); color:var(--paper); border:1px solid rgba(242,236,216,.14); border-radius:8px; padding:11px 12px; font-family:'Space Grotesk',sans-serif; font-size:15px; }
.gd-section { background: var(--panel); border-radius: 14px; padding: 16px; margin: 16px 0; border: 1px solid rgba(242,236,216,0.08); }
.gd-section-title { font-family:'JetBrains Mono', monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin:0 0 12px; }
.gd-player-grid { display:grid; gap:8px; }
.gd-player-card { background:var(--panel-2); border-radius:10px; padding:12px; border-left:3px solid rgba(242,236,216,.12); }
.gd-player-card.gd-has-song { border-left-color:var(--cyan); }
.gd-player-name { font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin:0 0 4px; }
.gd-card-song { margin:0; font-size:15px; }
.gd-card-song b { color:var(--paper); }
.gd-card-empty { margin:0; color:var(--muted); font-size:13px; }
.gd-vote-card { background:var(--panel-2); border-radius:10px; padding:14px; margin-bottom:10px; }
.gd-vote-row { display:flex; align-items:center; gap:10px; margin-top:10px; }
.gd-vote-row input[type=range] { flex:1; }
.gd-score-pill { min-width:34px; text-align:center; font-family:'Anton',sans-serif; font-size:22px; color:var(--amber); }
.gd-comment { width:100%; background:var(--panel); border:1px solid rgba(242,236,216,.14); border-radius:8px; padding:10px; color:var(--paper); font-family:'Space Grotesk',sans-serif; margin-top:8px; }
.gd-leader-row { display:flex; justify-content:space-between; gap:10px; align-items:center; background:var(--panel-2); border-radius:10px; padding:12px; margin-bottom:8px; }
.gd-rank { font-family:'Anton',sans-serif; color:var(--amber); font-size:24px; min-width:34px; }
.gd-leader-main { flex:1; min-width:0; }
.gd-leader-main p { margin:0; }
.gd-leader-score { font-family:'Anton',sans-serif; color:var(--cyan); font-size:28px; }
.gd-small-muted { color:var(--muted); font-size:12px; font-family:'JetBrains Mono',monospace; }
.gd-hidden { display:none; }
</style>

</head>
<body>
  <div class="gd-wrap" id="gd-app">
    <div class="gd-loading">shuffling the crate...</div>
  </div>

<script>
(function() {
  const SUPABASE_URL = "https://cqnpjwyldsuxkpazsoxx.supabase.co";
  const SUPABASE_KEY = "sb_publishable_UjD0ZU9zQ3SGLM0FV1uKQA_IitMevWS";
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const PLAYERS = ["Nick", "Nani", "Trenton", "Danny", "Jace"];
  const GENRES = [
    "City Pop", "Shoegaze", "Motown", "Bossa Nova", "90s Boom Bap",
    "Yacht Rock", "Afrobeat", "Britpop", "Synthwave", "Bluegrass",
    "K-Pop", "Reggaeton", "Dream Pop", "Funk", "Disco",
    "Post-Punk", "Trip-Hop", "Flamenco Pop", "Deep Soul", "Grunge",
    "Ambient", "Jazz Fusion", "Country Pop", "Emo Revival", "Doo-Wop",
    "Neo-Soul", "Math Rock", "Baroque Pop", "Ska", "Industrial"
  ];

  const root = document.getElementById('gd-app');
  let state = { round: null, submissions: [], votes: [], player: localStorage.getItem('gd-player') || PLAYERS[0], history: [] };

  function todayStr() {
    const d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,'0') + "-" + String(d.getDate()).padStart(2,'0');
  }
  function prettyDate(iso) {
    const p = iso.split('-').map(Number);
    return new Date(p[0], p[1]-1, p[2]).toLocaleDateString(undefined, { weekday:'short', month:'short', day:'numeric' });
  }
  function escapeHtml(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
  function pickGenre(recent) {
    const pool = GENRES.filter(g => recent.indexOf(g) === -1);
    const usable = pool.length ? pool : GENRES;
    return usable[Math.floor(Math.random() * usable.length)];
  }

  async function getOrCreateRound() {
    const id = todayStr();
    let { data, error } = await sb.from('gd_rounds').select('*').eq('id', id).maybeSingle();
    if (error) throw error;
    if (data) return data;

    const { data: recentRows, error: recentErr } = await sb.from('gd_rounds').select('genre').order('id', { ascending:false }).limit(6);
    if (recentErr) throw recentErr;
    const genre = pickGenre((recentRows || []).map(r => r.genre));

    const { data: inserted, error: insertErr } = await sb.from('gd_rounds').insert({ id, genre }).select('*').single();
    if (!insertErr) return inserted;

    // Someone else may have opened the app at the same time and created today's round.
    const retry = await sb.from('gd_rounds').select('*').eq('id', id).single();
    if (retry.error) throw insertErr;
    return retry.data;
  }

  async function loadRoundData(roundId) {
    const [subsRes, votesRes, histRes] = await Promise.all([
      sb.from('gd_submissions').select('*').eq('round_id', roundId).order('created_at', { ascending:true }),
      sb.from('gd_votes').select('*').eq('round_id', roundId),
      sb.from('gd_rounds').select('*').neq('id', roundId).order('id', { ascending:false }).limit(10)
    ]);
    if (subsRes.error) throw subsRes.error;
    if (votesRes.error) throw votesRes.error;
    if (histRes.error) throw histRes.error;
    state.submissions = subsRes.data || [];
    state.votes = votesRes.data || [];
    state.history = histRes.data || [];
  }

  async function saveSubmission(song) {
    const existing = state.submissions.find(s => s.player === state.player);
    const payload = {
      round_id: state.round.id,
      player: state.player,
      song_title: song.title,
      song_artist: song.artist,
      song_url: song.url || null,
      updated_at: new Date().toISOString()
    };
    let result;
    if (existing) {
      result = await sb.from('gd_submissions').update(payload).eq('id', existing.id).select('*').single();
    } else {
      result = await sb.from('gd_submissions').insert(payload).select('*').single();
    }
    if (result.error) throw result.error;
    await refresh();
  }

  async function saveVote(submissionId, score, comment) {
    const existing = state.votes.find(v => v.voter === state.player && v.submission_id === submissionId);
    const payload = {
      round_id: state.round.id,
      voter: state.player,
      submission_id: submissionId,
      score: Number(score),
      comment: comment || null,
      updated_at: new Date().toISOString()
    };
    let result;
    if (existing) {
      result = await sb.from('gd_votes').update(payload).eq('id', existing.id).select('*').single();
    } else {
      result = await sb.from('gd_votes').insert(payload).select('*').single();
    }
    if (result.error) throw result.error;
    await refresh();
  }

  function submissionFor(player) { return state.submissions.find(s => s.player === player); }
  function voteFor(submissionId) { return state.votes.find(v => v.voter === state.player && v.submission_id === submissionId); }
  function allSubmitted() { return PLAYERS.every(p => submissionFor(p)); }

  function leaderboard() {
    return state.submissions.map(s => {
      const votes = state.votes.filter(v => v.submission_id === s.id);
      const avg = votes.length ? votes.reduce((sum,v)=>sum+Number(v.score),0) / votes.length : null;
      return { submission: s, votes, avg };
    }).sort((a,b) => (b.avg ?? -1) - (a.avg ?? -1));
  }

  function render() {
    const mine = submissionFor(state.player);
    const submittedCount = state.submissions.length;
    const statusText = allSubmitted() ? 'Voting is live' : submittedCount + ' of ' + PLAYERS.length + ' submitted';
    const statusDot = allSubmitted() ? 'gd-live' : 'gd-done';

    root.innerHTML =
      '<div class="gd-header">' +
        '<p class="gd-eyebrow">Group Chat Radio</p>' +
        '<h1 class="gd-title">Genre <span>Draw</span></h1>' +
        '<p class="gd-sub">One genre. Five songs. Peer-reviewed chaos.</p>' +
      '</div>' +
      '<div class="gd-player-select"><label for="gd-player">I am</label><select id="gd-player">' +
        PLAYERS.map(p => '<option value="'+escapeHtml(p)+'" '+(p===state.player?'selected':'')+'>'+escapeHtml(p)+'</option>').join('') +
      '</select></div>' +
      '<div class="gd-ticket">' +
        '<div class="gd-ticket-top"><span>Today's Round</span><span>' + prettyDate(state.round.id) + '</span></div>' +
        '<p class="gd-drawn-for">Assigned genre</p>' +
        '<p class="gd-person">Everyone</p>' +
        '<p class="gd-genre-label">Make it fit</p>' +
        '<div class="gd-genre-stamp">' + escapeHtml(state.round.genre) + '</div>' +
        '<div class="gd-status-row"><span class="gd-dot ' + statusDot + '"></span><span>' + statusText + '</span></div>' +
        '<div class="gd-perf"></div>' +
        '<div id="gd-form-zone"></div>' +
      '</div>' +
      '<div id="gd-submissions-zone"></div>' +
      '<div id="gd-voting-zone"></div>' +
      '<div id="gd-leaderboard-zone"></div>' +
      '<p class="gd-hist-title">Past Genres</p>' +
      '<div>' + (state.history.length ? state.history.map(h => '<div class="gd-stub"><div class="gd-stub-left"><div class="gd-stub-date">'+prettyDate(h.id)+'</div><div class="gd-stub-main"><b>'+escapeHtml(h.genre)+'</b></div></div><div class="gd-stub-genre">Round</div></div>').join('') : '<p class="gd-empty">No past rounds yet.</p>') + '</div>';

    document.getElementById('gd-player').onchange = function(e) {
      state.player = e.target.value;
      localStorage.setItem('gd-player', state.player);
      render();
    };
    renderFormZone(false);
    renderSubmissions();
    renderVoting();
    renderLeaderboard();
  }

  function renderFormZone(editing) {
    const zone = document.getElementById('gd-form-zone');
    const mine = submissionFor(state.player);
    if (mine && !editing) {
      zone.innerHTML = '<div class="gd-submitted"><p class="gd-song-title">'+escapeHtml(mine.song_title)+'</p><p class="gd-song-artist">'+escapeHtml(mine.song_artist)+'</p>' +
        (mine.song_url ? '<a href="'+escapeHtml(mine.song_url)+'" target="_blank" rel="noopener">Open link &rarr;</a>' : '') +
        '</div><button class="gd-edit-link" id="gd-edit-btn">Edit my submission</button>';
      document.getElementById('gd-edit-btn').onclick = () => renderFormZone(true);
      return;
    }
    zone.innerHTML = '<div class="gd-form"><div class="gd-row2">' +
      '<div class="gd-field"><label for="gd-title">Song title</label><input id="gd-title" type="text" placeholder="e.g. Plastic Love" value="'+(mine?escapeHtml(mine.song_title):'')+'" /></div>' +
      '<div class="gd-field"><label for="gd-artist">Artist</label><input id="gd-artist" type="text" placeholder="e.g. Mariya Takeuchi" value="'+(mine?escapeHtml(mine.song_artist):'')+'" /></div>' +
      '</div><div class="gd-field"><label for="gd-url">Link (optional)</label><input id="gd-url" type="url" placeholder="Spotify / YouTube / Apple Music link" value="'+(mine&&mine.song_url?escapeHtml(mine.song_url):'')+'" /></div>' +
      '<button class="gd-submit-btn" id="gd-submit-btn">'+(mine?'Update my pick':'Send it to the group')+'</button></div>';
    document.getElementById('gd-submit-btn').onclick = async function() {
      const title = document.getElementById('gd-title').value.trim();
      const artist = document.getElementById('gd-artist').value.trim();
      const url = document.getElementById('gd-url').value.trim();
      const btn = document.getElementById('gd-submit-btn');
      if (!title || !artist) { btn.textContent='Add a title and artist first'; setTimeout(()=>btn.textContent=(mine?'Update my pick':'Send it to the group'),1600); return; }
      btn.disabled = true; btn.textContent = 'Saving...';
      try { await saveSubmission({ title, artist, url }); } catch(e) { console.error(e); btn.disabled=false; btn.textContent='Something went wrong — try again'; }
    };
  }

  function renderSubmissions() {
    document.getElementById('gd-submissions-zone').innerHTML = '<div class="gd-section"><p class="gd-section-title">Submissions</p><div class="gd-player-grid">' +
      PLAYERS.map(p => {
        const s = submissionFor(p);
        return '<div class="gd-player-card '+(s?'gd-has-song':'')+'"><p class="gd-player-name">'+escapeHtml(p)+'</p>' +
          (s ? '<p class="gd-card-song"><b>'+escapeHtml(s.song_title)+'</b> — '+escapeHtml(s.song_artist)+'</p>' : '<p class="gd-card-empty">Waiting for a pick...</p>') +
          '</div>';
      }).join('') + '</div></div>';
  }

  function renderVoting() {
    const zone = document.getElementById('gd-voting-zone');
    if (!allSubmitted()) { zone.innerHTML = '<div class="gd-section"><p class="gd-section-title">Voting</p><p class="gd-empty">Voting unlocks when all five songs are in.</p></div>'; return; }
    const others = state.submissions.filter(s => s.player !== state.player);
    zone.innerHTML = '<div class="gd-section"><p class="gd-section-title">Vote for genre fit</p>' + others.map(s => {
      const v = voteFor(s.id);
      const val = v ? v.score : 7;
      return '<div class="gd-vote-card" data-submission="'+s.id+'"><p class="gd-player-name">'+escapeHtml(s.player)+'</p><p class="gd-card-song"><b>'+escapeHtml(s.song_title)+'</b> — '+escapeHtml(s.song_artist)+'</p>' +
        '<div class="gd-vote-row"><input type="range" min="1" max="10" value="'+val+'" class="gd-range"><span class="gd-score-pill">'+val+'</span></div>' +
        '<input class="gd-comment" type="text" placeholder="Optional roast / rationale" value="'+(v&&v.comment?escapeHtml(v.comment):'')+'" />' +
        '<button class="gd-submit-btn gd-vote-btn" style="margin-top:10px">'+(v?'Update vote':'Save vote')+'</button></div>';
    }).join('') + '</div>';
    zone.querySelectorAll('.gd-vote-card').forEach(card => {
      const range = card.querySelector('.gd-range');
      const pill = card.querySelector('.gd-score-pill');
      range.oninput = () => pill.textContent = range.value;
      card.querySelector('.gd-vote-btn').onclick = async function() {
        const btn = this; btn.disabled = true; btn.textContent = 'Saving...';
        try { await saveVote(card.dataset.submission, range.value, card.querySelector('.gd-comment').value.trim()); }
        catch(e) { console.error(e); btn.disabled = false; btn.textContent = 'Try again'; }
      };
    });
  }

  function renderLeaderboard() {
    const zone = document.getElementById('gd-leaderboard-zone');
    if (!allSubmitted()) { zone.innerHTML = ''; return; }
    const rows = leaderboard();
    zone.innerHTML = '<div class="gd-section"><p class="gd-section-title">Leaderboard</p>' + rows.map((r, idx) =>
      '<div class="gd-leader-row"><div class="gd-rank">#'+(idx+1)+'</div><div class="gd-leader-main"><p><b>'+escapeHtml(r.submission.player)+'</b> · '+escapeHtml(r.submission.song_title)+' — '+escapeHtml(r.submission.song_artist)+'</p><p class="gd-small-muted">'+r.votes.length+' vote'+(r.votes.length===1?'':'s')+'</p></div><div class="gd-leader-score">'+(r.avg===null?'—':r.avg.toFixed(1))+'</div></div>'
    ).join('') + '</div>';
  }

  async function refresh() {
    await loadRoundData(state.round.id);
    render();
  }

  async function init() {
    try {
      state.round = await getOrCreateRound();
      await loadRoundData(state.round.id);
      render();
    } catch(e) {
      console.error(e);
      root.innerHTML = '<div class="gd-error">Couldn't connect to the new Genre Draw tables. Run the v1 SQL setup, then refresh.</div>';
    }
  }
  init();
})();
</script>
</body>
</html>
