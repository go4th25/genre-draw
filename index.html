<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Genre Draw</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

* { box-sizing: border-box; }

body {
  --ink: #14121A;
  --panel: #1E1B29;
  --panel-2: #262236;
  --paper: #F2ECD8;
  --coral: #FF5D73;
  --amber: #F4C744;
  --cyan: #4FD2C7;
  --muted: #8B86A0;

  margin: 0;
  font-family: 'Space Grotesk', sans-serif;
  background: var(--ink);
  color: var(--paper);
  min-height: 100vh;
  padding: 32px 16px 64px;
  background-image:
    radial-gradient(circle at 15% 10%, rgba(255,93,115,0.10), transparent 40%),
    radial-gradient(circle at 85% 90%, rgba(79,210,199,0.10), transparent 40%);
}

.gd-wrap { max-width: 560px; margin: 0 auto; }

.gd-header { text-align: center; margin-bottom: 28px; }
.gd-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.18em;
  color: var(--cyan);
  text-transform: uppercase;
  margin: 0 0 6px;
}
.gd-title {
  font-family: 'Anton', sans-serif;
  font-weight: 400;
  font-size: clamp(32px, 8vw, 46px);
  letter-spacing: 0.02em;
  margin: 0;
  line-height: 1;
}
.gd-title span { color: var(--coral); }
.gd-sub {
  font-size: 14px;
  color: var(--muted);
  margin: 8px 0 0;
}

.gd-ticket {
  position: relative;
  background: var(--panel);
  border-radius: 18px;
  padding: 28px 26px 24px;
  margin-bottom: 8px;
  overflow: hidden;
  border: 1px solid rgba(242,236,216,0.08);
}
.gd-ticket::before, .gd-ticket::after {
  content: "";
  position: absolute;
  width: 26px; height: 26px;
  background: var(--ink);
  border-radius: 50%;
  top: 50%;
  transform: translateY(-50%);
}
.gd-ticket::before { left: -13px; }
.gd-ticket::after { right: -13px; }

.gd-perf {
  border-top: 2px dashed rgba(242,236,216,0.18);
  margin: 22px -26px 20px;
}

.gd-ticket-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
}

.gd-drawn-for {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin: 4px 0 2px;
}

.gd-person {
  font-family: 'Anton', sans-serif;
  font-size: clamp(38px, 12vw, 58px);
  line-height: 1;
  margin: 2px 0 14px;
  color: var(--paper);
  min-height: 1.1em;
}

.gd-genre-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin: 0 0 6px;
}
.gd-genre-stamp {
  display: inline-block;
  font-family: 'Anton', sans-serif;
  font-size: clamp(20px, 5.5vw, 26px);
  color: var(--amber);
  border: 3px solid var(--amber);
  border-radius: 8px;
  padding: 6px 16px;
  transform: rotate(-2.5deg);
  letter-spacing: 0.02em;
}

.gd-status-row {
  margin-top: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
}
.gd-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
.gd-dot.gd-live { background: var(--cyan); box-shadow: 0 0 0 3px rgba(79,210,199,0.18); }
.gd-dot.gd-done { background: var(--coral); box-shadow: 0 0 0 3px rgba(255,93,115,0.18); }

.gd-form { margin-top: 18px; }
.gd-field { margin-bottom: 12px; }
.gd-field label {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
.gd-field input {
  width: 100%;
  background: var(--panel-2);
  border: 1px solid rgba(242,236,216,0.14);
  border-radius: 8px;
  padding: 11px 12px;
  color: var(--paper);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 15px;
}
.gd-field input:focus {
  outline: 2px solid var(--cyan);
  outline-offset: 1px;
  border-color: transparent;
}
.gd-field input::placeholder { color: rgba(242,236,216,0.32); }

.gd-row2 { display: flex; gap: 10px; }
.gd-row2 .gd-field { flex: 1; }

.gd-submit-btn {
  width: 100%;
  background: var(--coral);
  color: var(--ink);
  border: none;
  border-radius: 8px;
  padding: 13px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  margin-top: 4px;
  transition: transform 0.1s ease, background 0.15s ease;
}
.gd-submit-btn:hover { background: #ff7286; }
.gd-submit-btn:active { transform: scale(0.98); }
.gd-submit-btn:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }
.gd-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.gd-submitted {
  margin-top: 18px;
  background: var(--panel-2);
  border-radius: 10px;
  padding: 16px;
  border-left: 3px solid var(--coral);
}
.gd-submitted .gd-song-title {
  font-family: 'Anton', sans-serif;
  font-size: 20px;
  margin: 0 0 2px;
}
.gd-submitted .gd-song-artist {
  color: var(--muted);
  font-size: 14px;
  margin: 0 0 8px;
}
.gd-submitted a {
  color: var(--cyan);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  text-decoration: none;
  border-bottom: 1px solid rgba(79,210,199,0.4);
}
.gd-edit-link {
  background: none;
  border: none;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  text-decoration: underline;
  cursor: pointer;
  padding: 0;
  margin-top: 10px;
}

.gd-upnext {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin: 18px 4px 28px;
  letter-spacing: 0.05em;
  flex-wrap: wrap;
}
.gd-upnext b { color: var(--paper); font-weight: 600; }
.gd-arrow { color: var(--muted); }

.gd-hist-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin: 0 0 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.gd-hist-title::after {
  content: "";
  flex: 1;
  height: 1px;
  background: rgba(242,236,216,0.12);
}

.gd-stub {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  background: var(--panel);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 8px;
  border: 1px solid rgba(242,236,216,0.06);
}
.gd-stub-left { min-width: 0; }
.gd-stub-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.gd-stub-main {
  font-size: 14px;
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.gd-stub-main b { color: var(--paper); }
.gd-stub-genre {
  flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--amber);
  border: 1px solid rgba(244,199,68,0.4);
  border-radius: 6px;
  padding: 4px 8px;
}
.gd-empty {
  color: var(--muted);
  font-size: 13px;
  font-family: 'JetBrains Mono', monospace;
  padding: 8px 2px;
}

.gd-loading, .gd-error {
  text-align: center;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  padding: 40px 0;
}
.gd-error { color: var(--coral); }

.gd-spotify-small {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-top: 8px;
}
.gd-spotify-small img {
  width: 42px;
  height: 42px;
  border-radius: 6px;
  object-fit: cover;
}
.gd-spotify-small a {
  color: var(--cyan);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  text-decoration: none;
  border-bottom: 1px solid rgba(79,210,199,0.4);
}
.gd-spotify-embed {
  margin-top: 12px;
  border-radius: 12px;
  overflow: hidden;
}
.gd-spotify-note {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-top: 8px;
}

@media (max-width: 380px) {
  .gd-row2 { flex-direction: column; }
}
</style>
</head>
<body>
  <div class="gd-wrap" id="gd-app">
    <div class="gd-loading">shuffling the crate...</div>
  </div>

<script>
(function() {
  const SUPABASE_URL = "https://cqnpjwyldsuxkpazsoxx.supabase.co";
  const SUPABASE_KEY = "sb_publishable_UjD0ZU9zQ3SGLM0FV1uKQA_IitMevWS";
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const NAMES = ["Nick", "Nani", "Trenton", "Danny", "Jace"];
  const GENRES = [
    "City Pop", "Shoegaze", "Motown", "Bossa Nova", "90s Boom Bap",
    "Yacht Rock", "Afrobeat", "Britpop", "Synthwave", "Bluegrass",
    "K-Pop", "Reggaeton", "Dream Pop", "Funk", "Disco",
    "Post-Punk", "Trip-Hop", "Flamenco Pop", "Deep Soul", "Grunge",
    "Ambient", "Jazz Fusion", "Country Pop", "Emo Revival", "Doo-Wop",
    "Neo-Soul", "Math Rock", "Baroque Pop", "Ska", "Industrial"
  ];

  const root = document.getElementById("gd-app");
  let state = { config: null, round: null, submissions: [], votes: [], history: [] };

  const PLAYER_KEY = "genreDrawPlayer";

  function getSavedPlayer() {
    const saved = localStorage.getItem(PLAYER_KEY);
    return NAMES.indexOf(saved) !== -1 ? saved : null;
  }

  function savePlayer(name) {
    if (NAMES.indexOf(name) !== -1) localStorage.setItem(PLAYER_KEY, name);
  }

  function clearSavedPlayer() {
    localStorage.removeItem(PLAYER_KEY);
  }

  function todayStr() {
    const parts = new Intl.DateTimeFormat("en-CA", {
      timeZone: "America/New_York",
      year: "numeric",
      month: "2-digit",
      day: "2-digit"
    }).formatToParts(new Date());

    const y = parts.find(p => p.type === "year").value;
    const m = parts.find(p => p.type === "month").value;
    const d = parts.find(p => p.type === "day").value;

    return y + "-" + m + "-" + d;
  }

  function prettyDate(iso) {
    const parts = iso.split("-").map(Number);
    const dt = new Date(parts[0], parts[1] - 1, parts[2]);
    return dt.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function escapeHtml(s) {
    const d = document.createElement("div");
    d.textContent = s || "";
    return d.innerHTML;
  }

  function pickGenre(recent) {
    const pool = GENRES.filter(g => recent.indexOf(g) === -1);
    const usable = pool.length ? pool : GENRES;
    return usable[Math.floor(Math.random() * usable.length)];
  }

  async function searchSpotify(title, artist) {
    try {
      const query = [title, artist].filter(Boolean).join(" ");
      const response = await fetch("/.netlify/functions/spotify-search?q=" + encodeURIComponent(query));
      const data = await response.json();

      if (!response.ok) {
        console.warn("Spotify search failed", data);
        return null;
      }

      return data.tracks && data.tracks.length ? data.tracks[0] : null;
    } catch (e) {
      console.warn("Spotify search unavailable", e);
      return null;
    }
  }

  function spotifyEmbedHtml(sub) {
    if (!sub.spotify_embed_url) return "";

    return '<div class="gd-spotify-embed">' +
      '<iframe src="' + escapeHtml(sub.spotify_embed_url) + '" width="100%" height="80" frameborder="0" allowfullscreen="" ' +
      'allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>' +
    '</div>';
  }

  function spotifySmallHtml(sub) {
    if (!sub.spotify_image && !sub.spotify_url) return "";

    return '<div class="gd-spotify-small">' +
      (sub.spotify_image ? '<img src="' + escapeHtml(sub.spotify_image) + '" alt="" />' : '') +
      '<div>' +
        (sub.spotify_album ? '<div class="gd-stub-date">' + escapeHtml(sub.spotify_album) + '</div>' : '') +
        (sub.spotify_embed_url ? '<div class="gd-stub-date" style="color:var(--cyan);margin-top:4px;">Spotify preview ready</div>' : (sub.spotify_url ? '<a href="' + escapeHtml(sub.spotify_url) + '" target="_blank" rel="noopener">Open in Spotify &rarr;</a>' : '')) +
      '</div>' +
    '</div>';
  }

  async function getConfig() {
    const { data, error } = await sb.from("config").select("*").eq("id", 1).maybeSingle();
    if (error) throw error;

    if (data) {
      return {
        order: data.order_list || shuffle(NAMES),
        cursor: data.cursor || 0,
        recentGenres: data.recent_genres || []
      };
    }

    const fresh = { order: shuffle(NAMES), cursor: 0, recentGenres: [] };
    const { error: insertErr } = await sb.from("config").insert({
      id: 1,
      order_list: fresh.order,
      cursor: fresh.cursor,
      recent_genres: fresh.recentGenres
    });
    if (insertErr) throw insertErr;
    return fresh;
  }

  async function saveConfig(config) {
    const { error } = await sb.from("config").update({
      order_list: config.order,
      cursor: config.cursor,
      recent_genres: config.recentGenres
    }).eq("id", 1);
    if (error) throw error;
  }

  async function getOrCreateRound(config) {
    const id = todayStr();

    const { data, error } = await sb.from("gd_rounds").select("*").eq("id", id).maybeSingle();
    if (error) throw error;
    if (data) return { round: data, config: config };

    const genre = pickGenre(config.recentGenres);
    const newConfig = {
      order: config.order,
      cursor: config.cursor,
      recentGenres: [genre].concat(config.recentGenres).slice(0, 6)
    };

    const { data: inserted, error: insertErr } = await sb
      .from("gd_rounds")
      .insert({ id: id, genre: genre })
      .select()
      .single();

    if (insertErr) throw insertErr;

    await saveConfig(newConfig);
    return { round: inserted, config: newConfig };
  }

  async function loadSubmissions(roundId) {
    const { data, error } = await sb
      .from("gd_submissions")
      .select("*")
      .eq("round_id", roundId)
      .order("created_at", { ascending: true });

    if (error) throw error;
    return data || [];
  }

  async function loadVotes(roundId) {
    const { data, error } = await sb
      .from("gd_votes")
      .select("*")
      .eq("round_id", roundId);

    if (error) throw error;
    return data || [];
  }

  async function saveSong(roundId, player, song) {
    const existing = state.submissions.find(s => s.player === player);

    const payload = {
      song_title: song.title,
      song_artist: song.artist,
      song_url: song.url || null,
      spotify_url: song.spotifyUrl || null,
      spotify_embed_url: song.spotifyEmbedUrl || null,
      spotify_image: song.spotifyImage || null,
      spotify_album: song.spotifyAlbum || null,
      updated_at: new Date().toISOString()
    };

    if (existing) {
      const { error } = await sb.from("gd_submissions").update(payload).eq("id", existing.id);
      if (error) throw error;
    } else {
      const { error } = await sb.from("gd_submissions").insert(Object.assign({
        round_id: roundId,
        player: player
      }, payload));
      if (error) throw error;
    }
  }

  async function saveVote(roundId, voter, submissionId, score) {
    const { error } = await sb.from("gd_votes").upsert({
      round_id: roundId,
      voter: voter,
      submission_id: submissionId,
      score: score,
      updated_at: new Date().toISOString()
    }, { onConflict: "round_id,voter,submission_id" });

    if (error) throw error;
  }

  async function loadHistory(excludeKey) {
    const { data, error } = await sb
      .from("gd_rounds")
      .select("*")
      .neq("id", excludeKey)
      .order("id", { ascending: false })
      .limit(10);

    if (error) throw error;
    return data || [];
  }

  function getSubmissionFor(player) {
    return state.submissions.find(s => s.player === player);
  }

  function getVote(voter, submissionId) {
    return state.votes.find(v => v.voter === voter && v.submission_id === submissionId);
  }

  function leaderboardRows() {
    return state.submissions.map(function(sub) {
      const votesForSong = state.votes.filter(v => v.submission_id === sub.id);
      const total = votesForSong.reduce((sum, v) => sum + Number(v.score || 0), 0);
      const avg = votesForSong.length ? total / votesForSong.length : 0;
      return { submission: sub, count: votesForSong.length, avg: avg };
    }).sort(function(a, b) { return b.avg - a.avg; });
  }

  function render() {
    const round = state.round;
    const submittedCount = state.submissions.length;
    const allSubmitted = submittedCount === NAMES.length;

    const playerListHtml = NAMES.map(function(name) {
      const sub = getSubmissionFor(name);

      if (sub) {
        return '<div class="gd-stub">' +
          '<div class="gd-stub-left">' +
            '<div class="gd-stub-date">' + escapeHtml(name) + '</div>' +
            '<div class="gd-stub-main"><b>' + escapeHtml(sub.song_title) + '</b> — ' + escapeHtml(sub.song_artist) + '</div>' +
            spotifySmallHtml(sub) +
            spotifyEmbedHtml(sub) +
          '</div>' +
          '<div class="gd-stub-genre">Submitted</div>' +
        '</div>';
      }

      return '<div class="gd-stub">' +
        '<div class="gd-stub-left">' +
          '<div class="gd-stub-date">' + escapeHtml(name) + '</div>' +
          '<div class="gd-stub-main"><span style="color:var(--muted)">Waiting for a song</span></div>' +
        '</div>' +
        '<div class="gd-stub-genre">Open</div>' +
      '</div>';
    }).join("");

    const historyHtml = state.history.length
      ? state.history.map(function(h) {
          return '<div class="gd-stub">' +
            '<div class="gd-stub-left">' +
              '<div class="gd-stub-date">' + prettyDate(h.id) + '</div>' +
              '<div class="gd-stub-main"><b>' + escapeHtml(h.genre) + '</b></div>' +
            '</div>' +
          '</div>';
        }).join("")
      : '<p class="gd-empty">No past group rounds yet.</p>';

    root.innerHTML =
      '<div class="gd-header">' +
        '<p class="gd-eyebrow">Group Chat Radio</p>' +
        '<h1 class="gd-title">Genre <span>Draw</span></h1>' +
        '<p class="gd-sub">One genre. Five songs. Let the debate begin.</p>' +
      '</div>' +

      '<div class="gd-ticket">' +
        '<div class="gd-ticket-top"><span>Group Round</span><span>' + prettyDate(round.id) + '</span></div>' +
        '<p class="gd-drawn-for">Today&apos;s genre</p>' +
        '<div class="gd-genre-stamp">' + escapeHtml(round.genre) + '</div>' +
        '<div class="gd-status-row"><span class="gd-dot ' + (allSubmitted ? 'gd-done' : 'gd-live') + '"></span><span>' + submittedCount + ' / ' + NAMES.length + ' songs submitted' + (allSubmitted ? ' — submissions locked' : '') + '</span></div>' +
        '<div class="gd-perf"></div>' +
        '<div id="gd-form-zone"></div>' +
      '</div>' +

      '<p class="gd-hist-title">Today&apos;s Submissions</p>' +
      playerListHtml +

      '<div id="gd-vote-zone"></div>' +

      '<p class="gd-hist-title" style="margin-top:28px;">Past Rounds</p>' +
      historyHtml;

    renderFormZone();
    renderVoteZone(allSubmitted);
  }

  function renderFormZone() {
    const zone = document.getElementById("gd-form-zone");
    const savedPlayer = getSavedPlayer();

    if (!savedPlayer) {
      const playerOptions = NAMES.map(function(name) {
        return '<option value="' + escapeHtml(name) + '">' + escapeHtml(name) + '</option>';
      }).join("");

      zone.innerHTML =
        '<div class="gd-form">' +
          '<div class="gd-field"><label for="gd-player">Who are you?</label>' +
            '<select id="gd-player" style="width:100%;background:var(--panel-2);border:1px solid rgba(242,236,216,0.14);border-radius:8px;padding:11px 12px;color:var(--paper);font-family:Space Grotesk,sans-serif;font-size:15px;">' +
              playerOptions +
            '</select>' +
          '</div>' +
          '<button class="gd-submit-btn" id="gd-save-player-btn">Continue</button>' +
        '</div>';

      document.getElementById("gd-save-player-btn").onclick = function() {
        savePlayer(document.getElementById("gd-player").value);
        render();
      };

      return;
    }

    const player = savedPlayer;
    const existing = getSubmissionFor(player);
    const allSubmitted = state.submissions.length === NAMES.length;

    if (allSubmitted && existing) {
      zone.innerHTML =
        '<div class="gd-submitted">' +
          '<div class="gd-status-row" style="margin-top:0;margin-bottom:14px;">' +
            '<span>Playing as <b>' + escapeHtml(player) + '</b></span>' +
            '<button class="gd-edit-link" id="gd-switch-player" style="margin-left:auto;">Switch player</button>' +
          '</div>' +
          '<p class="gd-song-title">' + escapeHtml(existing.song_title) + '</p>' +
          '<p class="gd-song-artist">' + escapeHtml(existing.song_artist) + '</p>' +
          spotifySmallHtml(existing) +
          spotifyEmbedHtml(existing) +
          '<p class="gd-spotify-note" style="margin-top:12px;">All 5 songs are in, so submissions are locked for today.</p>' +
        '</div>';

      document.getElementById("gd-switch-player").onclick = function() {
        clearSavedPlayer();
        render();
      };

      return;
    }

    zone.innerHTML =
      '<div class="gd-form">' +
        '<div class="gd-status-row" style="margin-top:0;margin-bottom:14px;">' +
          '<span>Playing as <b>' + escapeHtml(player) + '</b></span>' +
          '<button class="gd-edit-link" id="gd-switch-player" style="margin-left:auto;">Switch player</button>' +
        '</div>' +
        '<div class="gd-row2">' +
          '<div class="gd-field"><label for="gd-title">Song title</label>' +
          '<input id="gd-title" type="text" placeholder="e.g. Plastic Love" value="' + (existing ? escapeHtml(existing.song_title) : '') + '" /></div>' +
          '<div class="gd-field"><label for="gd-artist">Artist</label>' +
          '<input id="gd-artist" type="text" placeholder="e.g. Mariya Takeuchi" value="' + (existing ? escapeHtml(existing.song_artist) : '') + '" /></div>' +
        '</div>' +
        '<div class="gd-field"><label for="gd-url">Backup link (optional)</label>' +
        '<input id="gd-url" type="url" placeholder="Optional YouTube / Apple Music / other link" value="' + (existing && existing.song_url ? escapeHtml(existing.song_url) : '') + '" /></div>' +
        '<p class="gd-spotify-note">Spotify will be searched automatically from the title + artist.</p>' +
        '<button class="gd-submit-btn" id="gd-submit-btn">' + (existing ? 'Update your song' : 'Submit your song') + '</button>' +
      '</div>';

    document.getElementById("gd-switch-player").onclick = function() {
      clearSavedPlayer();
      render();
    };

    document.getElementById("gd-submit-btn").onclick = async function() {
      const title = document.getElementById("gd-title").value.trim();
      const artist = document.getElementById("gd-artist").value.trim();
      const url = document.getElementById("gd-url").value.trim();
      const btn = document.getElementById("gd-submit-btn");

      if (!title || !artist) {
        btn.textContent = "Add a title and artist first";
        setTimeout(function() { btn.textContent = existing ? "Update your song" : "Submit your song"; }, 1600);
        return;
      }

      btn.disabled = true;
      btn.textContent = "Submitting...";

      try {
        btn.textContent = "Finding Spotify match...";
        const spotify = await searchSpotify(title, artist);

        await saveSong(state.round.id, player, {
          title: spotify ? spotify.title : title,
          artist: spotify ? spotify.artist : artist,
          url: url,
          spotifyUrl: spotify ? spotify.spotifyUrl : null,
          spotifyEmbedUrl: spotify ? spotify.embedUrl : null,
          spotifyImage: spotify ? spotify.image : null,
          spotifyAlbum: spotify ? spotify.album : null
        });

        state.submissions = await loadSubmissions(state.round.id);
        state.votes = await loadVotes(state.round.id);
        render();
      } catch (e) {
        console.error(e);
        btn.disabled = false;
        btn.textContent = "Something went wrong — try again";
      }
    };
  }

  function renderVoteZone(allSubmitted) {
    const zone = document.getElementById("gd-vote-zone");
    const savedPlayer = getSavedPlayer();

    if (!allSubmitted) {
      zone.innerHTML =
        '<p class="gd-hist-title" style="margin-top:28px;">Voting</p>' +
        '<p class="gd-empty">Voting unlocks once all 5 songs are submitted.</p>';
      return;
    }

    const leaderboard = leaderboardRows();
    const leaderboardHtml = leaderboard.map(function(row, index) {
      const medal = index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : "";
      const avgText = row.count ? row.avg.toFixed(1) : "—";
      return '<div class="gd-stub">' +
        '<div class="gd-stub-left">' +
          '<div class="gd-stub-date">' + medal + ' ' + escapeHtml(row.submission.player) + '</div>' +
          '<div class="gd-stub-main"><b>' + escapeHtml(row.submission.song_title) + '</b> — ' + escapeHtml(row.submission.song_artist) + '</div>' +
          spotifySmallHtml(row.submission) +
          spotifyEmbedHtml(row.submission) +
        '</div>' +
        '<div class="gd-stub-genre">' + avgText + '</div>' +
      '</div>';
    }).join("");

    if (!savedPlayer) {
      zone.innerHTML =
        '<p class="gd-hist-title" style="margin-top:28px;">Voting</p>' +
        '<p class="gd-empty">Choose who you are above to vote.</p>' +
        '<p class="gd-hist-title" style="margin-top:28px;">Leaderboard</p>' +
        leaderboardHtml;
      return;
    }

    zone.innerHTML =
      '<p class="gd-hist-title" style="margin-top:28px;">Voting</p>' +
      '<div class="gd-ticket" style="margin-top:8px;">' +
        '<p class="gd-genre-label">Cast votes</p>' +
        '<div class="gd-status-row" style="margin-top:0;margin-bottom:14px;">' +
          '<span>Voting as <b>' + escapeHtml(savedPlayer) + '</b></span>' +
        '</div>' +
        '<div id="gd-vote-list"></div>' +
      '</div>' +
      '<p class="gd-hist-title" style="margin-top:28px;">Leaderboard</p>' +
      leaderboardHtml;

    setupVoteControls(savedPlayer);
  }

  function setupVoteControls(voter) {
    const voteList = document.getElementById("gd-vote-list");

    function scoreOptions(current) {
      let html = '<option value="">Score</option>';
      for (let i = 1; i <= 10; i++) {
        html += '<option value="' + i + '"' + (Number(current) === i ? ' selected' : '') + '>' + i + '</option>';
      }
      return html;
    }

    const voteable = state.submissions.filter(s => s.player !== voter);

    voteList.innerHTML = voteable.map(function(sub) {
      const existing = getVote(voter, sub.id);
      const current = existing ? existing.score : "";

      const voteControl = existing
        ? '<div class="gd-stub-genre">' + escapeHtml(String(current)) + '/10 locked</div>'
        : '<select class="gd-score-select" data-submission-id="' + sub.id + '" style="background:var(--panel-2);border:1px solid rgba(242,236,216,0.14);border-radius:8px;padding:8px;color:var(--paper);font-family:JetBrains Mono,monospace;font-size:12px;">' +
            scoreOptions(current) +
          '</select>';

      return '<div class="gd-stub">' +
        '<div class="gd-stub-left">' +
          '<div class="gd-stub-date">' + escapeHtml(sub.player) + '</div>' +
          '<div class="gd-stub-main"><b>' + escapeHtml(sub.song_title) + '</b> — ' + escapeHtml(sub.song_artist) + '</div>' +
          spotifySmallHtml(sub) +
          spotifyEmbedHtml(sub) +
        '</div>' +
        voteControl +
      '</div>';
    }).join("");

    Array.from(document.querySelectorAll(".gd-score-select")).forEach(function(select) {
      select.onchange = async function() {
        const score = Number(select.value);
        const submissionId = select.getAttribute("data-submission-id");
        if (!score) return;

        select.disabled = true;
        try {
          await saveVote(state.round.id, voter, submissionId, score);
          state.votes = await loadVotes(state.round.id);
          render();
        } catch (e) {
          console.error(e);
          select.disabled = false;
        }
      };
    });
  }

  async function init() {
    try {
      const config = await getConfig();
      const result = await getOrCreateRound(config);
      const submissions = await loadSubmissions(result.round.id);
      const votes = await loadVotes(result.round.id);
      const history = await loadHistory(result.round.id);

      state = {
        config: result.config,
        round: result.round,
        submissions: submissions,
        votes: votes,
        history: history
      };

      render();
    } catch (e) {
      console.error(e);
      root.innerHTML = '<div class="gd-error">Couldn&apos;t connect to the database. Check the browser console for details.</div>';
    }
  }

  init();
})();
</script>
</body>
</html>
